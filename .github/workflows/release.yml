name: SmartFix Matrix Firmware Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Build firmware
        run: |
          pio run -e esp32-s3-rgb-matrix

      - name: Prepare release files
        run: |
          mkdir -p dist
          cp .pio/build/esp32-s3-rgb-matrix/SmartFix-Matrix-ota.bin dist/SmartFix-Matrix-ota.bin
          cp .pio/build/esp32-s3-rgb-matrix/SmartFix-Matrix-usb.bin dist/SmartFix-Matrix-usb.bin

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" dist/* \
            --title "SmartFix Matrix $TAG" \
            --generate-notes \
            --latest \
            --verify-tag